---
# defaults file for ansible-role-packer

# Define Packer version to install
# Possible values: https://releases.hashicorp.com/packer/index.json
# Default: latest
packer_version: latest

# Define url where to download packer package
# Default: use local system path defined in Ansible vars/*.yml
packer_pkg_url: "{{ _packer_pkg_url }}"

# Define where to install Packer binary
# Default: use local system path defined in Ansible vars/*.yml
packer_path: "{{ _packer_path }}"

# Define Packer plugins to install
# Example:
#   packer_plugins:
#     - "github.com/hashicorp/docker"
#     - "github.com/hashicorp/ansible"
#     - "github.com/hashicorp/qemu"
packer_plugins: []

# Enable SHA256 checksum verification of the downloaded archive
# Default: true
packer_checksum_verify: true

# Define the URL of the SHA256SUMS file used to verify the downloaded archive
# Default: use the URL defined in Ansible vars/main.yml
packer_checksum_url: "{{ _packer_checksum_url }}"
